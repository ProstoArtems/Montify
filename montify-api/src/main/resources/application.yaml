spring:
  config:
    import: optional:dotenv:../.env

server:
  port: 8080

minio:
  endpoint: ${MINIO_ENDPOINT:localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:video-editor}
  use-ssl: ${MINIO_USE_SSL:false}

app:
  redis:
    addr: ${REDIS_ADDR:localhost:6379}
    queue-name: ${REDIS_QUEUE_NAME:video_render_queue}
